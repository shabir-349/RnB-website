<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign Up — R&amp;B Research and Beyond</title>
  <meta name="description" content="Create your R&B account and start your research journey." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Lora:ital,wght@0,400;0,600;1,400;1,600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <link rel="icon" type="image/jpeg" href="./logo.jpg" />
</head>
<body>

  <header class="rb-nav" id="rb-nav" role="banner">
    <div class="rb-nav__inner">
      <a href="index.html" class="rb-logo" aria-label="R&B — Research and Beyond home">R&amp;B</a>
      <nav class="rb-nav__links" aria-label="Primary navigation">
        <a href="index.html#how-it-works">How it works</a>
        <a href="index.html#modes">Modes</a>
        <a href="index.html#academy">Academy</a>
        <a href="index.html#pricing">Pricing</a>
      </nav>
      <div class="rb-nav__actions">
        <button class="rb-theme-toggle" id="rb-theme-toggle" aria-label="Toggle dark mode">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icon-sun" aria-hidden="true"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/></svg>
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icon-moon" aria-hidden="true"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></svg>
        </button>
        <a href="signin.html" class="rb-signin">Sign in</a>
        <button class="rb-hamburger" id="rb-hamburger" aria-label="Open menu" aria-expanded="false" aria-controls="rb-mobile-menu">
          <span></span><span></span><span></span>
        </button>
      </div>
    </div>
  </header>

  <div class="rb-mobile-menu" id="rb-mobile-menu" role="dialog" aria-modal="true" aria-label="Mobile navigation">
    <nav aria-label="Mobile navigation links">
      <a href="index.html#how-it-works">How it works</a>
      <a href="index.html#modes">Modes</a>
      <a href="index.html#academy">Academy</a>
      <a href="index.html#pricing">Pricing</a>
      <a href="signin.html" class="rb-mobile-signin">Sign in</a>
    </nav>
  </div>

  <main class="rb-auth-main">
    <a href="index.html" class="rb-auth-back">&#8592; Back</a>
    <div class="rb-auth-wrap">
      <div class="rb-auth-card">
        <div class="rb-auth-card__header">
          <h1 class="rb-auth-card__title">Create your account</h1>
          <p class="rb-auth-card__sub">Join researchers across 20+ countries building their first publication.</p>
        </div>

        <form class="rb-form" id="rb-signup-form" novalidate>
          <div class="rb-form__group">
            <label class="rb-form__label" for="signup-name">Full name</label>
            <input class="rb-form__input" type="text" id="signup-name" name="name"
              placeholder="Dr. Ahmed Khan" autocomplete="name" required />
            <span class="rb-form__error" id="signup-name-err" role="alert"></span>
          </div>

          <div class="rb-form__group">
            <label class="rb-form__label" for="signup-email">Email address</label>
            <input class="rb-form__input" type="email" id="signup-email" name="email"
              placeholder="you@university.edu" autocomplete="email" required />
            <span class="rb-form__error" id="signup-email-err" role="alert"></span>
          </div>

          <div class="rb-form__group">
            <label class="rb-form__label" for="signup-password">Password</label>
            <div class="rb-form__input-wrap">
              <input class="rb-form__input" type="password" id="signup-password" name="password"
                placeholder="At least 8 characters" autocomplete="new-password" required />
              <button type="button" class="rb-form__pw-toggle" aria-label="Show password" data-target="signup-password">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icon-eye" aria-hidden="true"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg>
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icon-eye-off" aria-hidden="true"><path d="M9.88 9.88a3 3 0 1 0 4.24 4.24"/><path d="M10.73 5.08A10.43 10.43 0 0 1 12 5c7 0 10 7 10 7a13.16 13.16 0 0 1-1.67 2.68"/><path d="M6.61 6.61A13.526 13.526 0 0 0 2 12s3 7 10 7a9.74 9.74 0 0 0 5.39-1.61"/><line x1="2" x2="22" y1="2" y2="22"/></svg>
              </button>
            </div>
            <span class="rb-form__error" id="signup-password-err" role="alert"></span>
          </div>

          <div class="rb-form__group">
            <label class="rb-form__label" for="signup-confirm">Confirm password</label>
            <div class="rb-form__input-wrap">
              <input class="rb-form__input" type="password" id="signup-confirm" name="confirm"
                placeholder="Repeat password" autocomplete="new-password" required />
              <button type="button" class="rb-form__pw-toggle" aria-label="Show confirm password" data-target="signup-confirm">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icon-eye" aria-hidden="true"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg>
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icon-eye-off" aria-hidden="true"><path d="M9.88 9.88a3 3 0 1 0 4.24 4.24"/><path d="M10.73 5.08A10.43 10.43 0 0 1 12 5c7 0 10 7 10 7a13.16 13.16 0 0 1-1.67 2.68"/><path d="M6.61 6.61A13.526 13.526 0 0 0 2 12s3 7 10 7a9.74 9.74 0 0 0 5.39-1.61"/><line x1="2" x2="22" y1="2" y2="22"/></svg>
              </button>
            </div>
            <span class="rb-form__error" id="signup-confirm-err" role="alert"></span>
          </div>

          <label class="rb-form__check">
            <input type="checkbox" id="signup-terms" name="terms" required />
            <span>I agree to the <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a></span>
          </label>
          <span class="rb-form__error" id="signup-terms-err" role="alert"></span>

          <button type="submit" class="rb-btn rb-btn--amber rb-btn--full rb-btn--lg">Create account</button>
          <p class="rb-form__msg" id="rb-signup-msg" role="alert" aria-live="polite"></p>
        </form>

        <div class="rb-auth-card__footer">
          Already have an account? <a href="signin.html">Sign in</a>
        </div>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="supabase.js"></script>
  <script src="script.js"></script>
</body>
</html>
