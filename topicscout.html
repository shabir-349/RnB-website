<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TopicScout — R&amp;B Research and Beyond</title>
  <meta name="description" content="Generate novel, publication-grade research topics tailored to your specialty." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Lora:ital,wght@0,400;0,600;1,400;1,600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <link rel="icon" type="image/jpeg" href="./logo.jpg" />
</head>
<body style="visibility: hidden;">

  <header class="rb-nav rb-dash-nav" id="rb-nav" role="banner">
    <div class="rb-nav__inner">
      <a href="dashboard.html" class="rb-vc-back-link" aria-label="Back to dashboard">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="m15 18-6-6 6-6"/></svg>
        Dashboard
      </a>
      <a href="index.html" class="rb-logo" aria-label="R&B — Research and Beyond home">R&amp;B</a>
      <div class="rb-dash-nav__breadcrumb" aria-label="Current page">TopicScout</div>
      <div class="rb-nav__actions rb-dash-nav__actions">
        <div class="rb-dash-nav__user">
          <div class="rb-dash-nav__avatar" aria-hidden="true">A</div>
          <span class="rb-dash-nav__username">Ahmed</span>
        </div>
        <a href="signin.html" class="rb-btn rb-btn--outline rb-dash-nav__signout rb-signout-trigger" id="rb-signout-btn">Sign out</a>
      </div>
    </div>
  </header>

  <main class="rb-vc-page">
    <div class="rb-container">

      <!-- Page header -->
      <div class="rb-vc-header">
        <div class="rb-vc-header__title-row">
          <h1 class="rb-vc-title">TopicScout</h1>
          <span class="rb-vc-free-badge">FREE</span>
        </div>
        <p class="rb-vc-header__sub">Generate novel, publication-grade research topics tailored to your specialty.</p>
      </div>

      <!-- Form -->
      <div class="rb-vc-form-card">
        <div class="rb-vc-form">

          <div class="rb-topicscout__field rb-topicscout__field--full">
            <label class="rb-topicscout__label" for="rb-ts-population">
              Population <span style="color: var(--text-muted); font-weight: 400;">*</span>
            </label>
            <input
              type="text"
              id="rb-ts-population"
              class="rb-topicscout__input"
              placeholder="e.g. adults with type 2 diabetes in South Asia"
              autocomplete="off"
            />
            <span id="rb-ts-pop-err" class="rb-ts-field-err" hidden>Population is required.</span>
          </div>

          <div class="rb-topicscout__field rb-topicscout__field--full">
            <label class="rb-topicscout__label" for="rb-ts-intervention">
              Intervention / Exposure <span style="color: var(--text-muted); font-weight: 400; font-size: 0.8125rem;">(optional)</span>
            </label>
            <input
              type="text"
              id="rb-ts-intervention"
              class="rb-topicscout__input"
              placeholder="e.g. metformin, exercise, or leave blank to let AI explore"
              autocomplete="off"
            />
          </div>

          <div class="rb-topicscout__field rb-topicscout__field--full">
            <label class="rb-topicscout__label" for="rb-ts-study-design">
              Study Design <span style="color: var(--text-muted); font-weight: 400;">*</span>
            </label>
            <select id="rb-ts-study-design" class="rb-topicscout__select">
              <option value="" disabled selected>Select a study design&hellip;</option>
              <option value="letter_to_editor">LTE</option>
              <option value="narrative_review">Narrative review</option>
              <option value="cross_sectional">Cross-sectional study</option>
              <option value="cohort">Cohort study</option>
              <option value="case_control">Case control study</option>
              <option value="rct">RCT</option>
              <option value="systematic_review_meta_analysis">Systematic review and meta-analysis</option>
              <option value="network_meta_analysis">Network meta-analysis</option>
            </select>
            <span id="rb-ts-design-err" class="rb-ts-field-err" hidden>Study Design is required.</span>
          </div>

          <div>
            <button type="button" id="rb-ts-btn" class="rb-btn rb-btn--amber">
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M9.937 15.5A2 2 0 0 0 8.5 14.063l-6.135-1.582a.5.5 0 0 1 0-.962L8.5 9.936A2 2 0 0 0 9.937 8.5l1.582-6.135a.5.5 0 0 1 .963 0L14.063 8.5A2 2 0 0 0 15.5 9.937l6.135 1.581a.5.5 0 0 1 0 .964L15.5 14.063a2 2 0 0 0-1.437 1.437l-1.582 6.135a.5.5 0 0 1-.963 0z"/></svg>
              Generate Topics
            </button>
            <p id="rb-ts-quota" class="rb-ts-quota" hidden aria-live="polite"></p>
          </div>

        </div>
      </div>

      <!-- Results — rendered by JS -->
      <div id="rb-ts-results" hidden></div>

    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="supabase.js"></script>
  <script src="script.js"></script>
</body>
</html>
